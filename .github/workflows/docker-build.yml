

name: Docker Build & Test

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'docker-compose.yaml'
      - 'producer/**'
      - 'consumer/**'
      - '.dockerignore'
  pull_request:
    branches: [ main ]
    paths:
      - 'docker-compose.yaml'
      - 'producer/**'
      - 'consumer/**'
      - '.dockerignore'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Cache Docker layers
      uses: actions/cache@v3
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-docker-${{ hashFiles('**/Dockerfile') }}
        restore-keys: |
          ${{ runner.os }}-docker-

    - name: Build producer Docker image
      run: |
        docker build --pull -t ${{ secrets.DOCKER_REGISTRY }}/producer:test ./producer
        docker tag ${{ secrets.DOCKER_REGISTRY }}/producer:test ${{ secrets.DOCKER_REGISTRY }}/producer:${{ github.sha }}

    - name: Test producer container
      run: |
        docker run --rm ${{ secrets.DOCKER_REGISTRY }}/producer:test echo "Producer build successful"

    - name: Build consumer Docker image
      run: |
        docker build --pull -t ${{ secrets.DOCKER_REGISTRY }}/consumer:test ./consumer
        docker tag ${{ secrets.DOCKER_REGISTRY }}/consumer:test ${{ secrets.DOCKER_REGISTRY }}/consumer:${{ github.sha }}

    - name: Test consumer container
      run: |
        docker run --rm ${{ secrets.DOCKER_REGISTRY }}/consumer:test echo "Consumer build successful"

    - name: Set up Go
      uses: actions/setup-go@v4
      if: always()
      with:
        go-version: '1.20'

    - name: Run unit tests in Docker
      run: |
        docker run --rm \
          -v $(go env GOMODCACHE):/go/pkg/mod \
          ${{ secrets.DOCKER_REGISTRY }}/consumer:test \
          make test-unit || echo "Tests require Kafka broker to be running"
